<body class="logged-out">
    <!-- Tela de Login -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <span class="login-icon">🔐</span>
                    <h2>Acesso Restrito</h2>
                    <p>Sistema DANFE</p>
                </div>
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label>Senha de Acesso</label>
                        <input type="password" id="senhaAcesso" placeholder="Digite a senha" required autofocus>
                    </div>
                    <button type="submit" class="btn-login">Entrar</button>
                    <div id="loginError" class="login-error"></div>
                </form>
                <div class="login-footer">
                    <small>Sistema seguro - Acesso autorizado apenas</small>
                </div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- Header com Logo -->
        <header class="header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-container">
                        <img id="logoImage" class="logo-image" src="image/logo.png" alt="Logo da Empresa">
                    </div>
                    <div class="logo-text">
                        <h1 class="logo">
                            <span class="logo-icon">📄</span>
                            <span>Sistema DANFE</span>
                        </h1>
                        <p class="subtitle">Gestão de Notas Fiscais e Boletos</p>
                    </div>
                </div>
                <div class="header-buttons">
                    <button id="boletosPageBtn" class="btn-boletos">
                        🎫 Boletos
                    </button>
                    <button id="exportExcelBtn" class="btn-export">
                        📊 Exportar Excel
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content - Página de Notas (visível por padrão) -->
        <main id="notasPage" class="main-content">
            <!-- Formulário de Cadastro de Nota -->
            <section class="card form-card">
                <h2 class="card-title">📝 Cadastro de Nota Fiscal</h2>
                <form id="notaForm" class="form-grid">
                    <div class="form-group">
                        <label>Nº NFe *</label>
                        <input type="text" id="nfeNumero" required placeholder="Ex: 123456789">
                    </div>
                    <div class="form-group">
                        <label>Data da Nota *</label>
                        <input type="date" id="dataNota" required>
                    </div>
                    <div class="form-group">
                        <label>Fornecedor *</label>
                        <input type="text" id="fornecedor" required placeholder="Nome do fornecedor">
                    </div>
                    <div class="form-group">
                        <label>Endereço</label>
                        <input type="text" id="endereco" placeholder="Rua, número, bairro">
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label>Descrição do Produto *</label>
                        <input type="text" id="descricao" required placeholder="Produto/Serviço">
                    </div>
                    <div class="form-group">
                        <label>Quantidade *</label>
                        <input type="number" id="quantidade" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Unidade</label>
                        <select id="unidade">
                            <option value="UN">UN</option>
                            <option value="PC">PC</option>
                            <option value="KG">KG</option>
                            <option value="L">L</option>
                            <option value="M">M</option>
                            <option value="CX">CX</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Preço Unitário *</label>
                        <input type="number" id="precoUnitario" step="0.01" required>
                    </div>
                    <div class="form-group full-width">
                        <button type="submit" class="btn-primary">➕ Cadastrar Nota</button>
                    </div>
                </form>
            </section>

                        <!-- Lista de Notas Fiscais -->
            <section class="card">
                <div class="header-notas">
                    <h2 class="card-title" style="margin-top: 0;">📋 Notas Fiscais Cadastradas</h2>
                </div>
                
                <!-- Filtro por Mês nas Notas -->
                <div class="filtro-mes-notas">
                    <div class="form-group">
                        <label>📅 Filtrar por Mês</label>
                        <select id="selectMesNotas" class="select-mes">
                            <option value="todos">-- Todos os meses --</option>
                        </select>
                    </div>
                </div>

                <!-- Lista de Notas Agrupadas por Mês -->
                <div id="notasAgrupadas" class="notas-agrupadas">
                    <!-- As notas serão renderizadas aqui agrupadas por mês -->
                </div>
            </section>
        </main>

        <!-- Página de Boletos (oculta por padrão) -->
        <main id="boletosPage" class="main-content" style="display: none;">
            <section class="card">
                <div class="header-boletos">
                    <button id="voltarNotasBtn" class="btn-voltar">
                        ◀ Voltar para Notas
                    </button>
                    <h2 class="card-title" style="margin-top: 0;">🎫 Gerenciamento de Boletos</h2>
                </div>
                
                <!-- Formulário para cadastrar novo boleto -->
                <div class="form-boletos">
                    <h3>➕ Adicionar Novo Boleto</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Selecione a Nota Fiscal *</label>
                            <select id="selectNotaBoleto" class="select-nota">
                                <option value="">-- Selecione uma nota --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Valor do Boleto *</label>
                            <input type="number" id="valorBoleto" step="0.01" placeholder="R$ 0,00">
                        </div>
                        <div class="form-group">
                            <label>Número de Parcelas *</label>
                            <input type="number" id="numParcelas" value="1" min="1" max="12">
                        </div>
                        <div class="form-group">
                            <label>Valor da Parcela</label>
                            <input type="text" id="valorParcela" readonly disabled placeholder="R$ 0,00">
                        </div>
                        <div class="form-group">
                            <label>Data do Primeiro Vencimento *</label>
                            <input type="date" id="parcelaData">
                        </div>
                        <div class="form-group full-width">
                            <button id="adicionarParcelasBtn" class="btn-primary">➕ Adicionar Parcela(s)</button>
                        </div>
                    </div>
                </div>

                <!-- Filtro por Mês -->
                <div class="filtro-mes">
                    <div class="form-group">
                        <label>📅 Selecione o Mês</label>
                        <select id="selectMes" class="select-mes">
                            <option value="todos">-- Todos os meses --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>🔍 Status</label>
                        <select id="selectStatus" class="select-status">
                            <option value="todos">Todos os status</option>
                            <option value="pendente">Pendentes</option>
                            <option value="vencido">Vencidos</option>
                            <option value="proximo">Próximo vencimento</option>
                            <option value="pago">Pagos</option>
                        </select>
                    </div>
                </div>

                <!-- Lista de Boletos Agrupados por Mês -->
                <div id="boletosAgrupados" class="boletos-agrupados">
                    <!-- Os boletos serão renderizados aqui agrupados por mês -->
                </div>
            </section>
        </main> 
    </div>

    <!-- Modais -->
    <div id="editNotaModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Editar Nota Fiscal</h2>
                <button class="modal-close" onclick="fecharModal('editNotaModal')">&times;</button>
            </div>
            <div id="editNotaForm"></div>
        </div>
    </div>

    <div id="editBoletoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Editar Boleto</h2>
                <button class="modal-close" onclick="fecharModal('editBoletoModal')">&times;</button>
            </div>
            <div id="editBoletoForm"></div>
        </div>
    </div>

    <script src="script.js?v=<?= time() ?>"></script>
    <script>
        // FORÇAR LIMPEZA COMPLETA DO SERVICE WORKER
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                    console.log('Service Worker desregistrado');
                }
            });
        }
        
        // Limpar cache do navegador
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) {
                    caches.delete(name);
                    console.log('Cache deletado:', name);
                }
            });
        }
        
        // Recarregar a página após limpeza
        window.addEventListener('load', function() {
            if (!sessionStorage.getItem('reloaded')) {
                sessionStorage.setItem('reloaded', 'true');
                setTimeout(function() {
                    location.reload(true);
                }, 100);
            }
        });
    </script>
</body>
</html>
